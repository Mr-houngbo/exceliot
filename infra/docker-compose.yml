

services:
  api:
    build: ../apps/api
    ports:
      - "8000:8000"
    env_file: ../apps/api/.env
    depends_on:
      - redis
    volumes:
      - ../apps/api:/app
    command: uvicorn main:app --host 0.0.0.0 --reload

  worker:
    build: ../apps/workers
    env_file: ../apps/workers/.env
    depends_on:
      - redis
    command: celery -A celery_app worker --loglevel=info
    volumes:
      - ../apps/workers:/app

  beat:
    build: ../apps/workers
    env_file: ../apps/workers/.env
    depends_on:
      - redis
    command: celery -A celery_app beat --loglevel=info
    volumes:
      - ../apps/workers:/app

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: ../apps/web
    ports:
      - "3000:3000"
    env_file: ../apps/web/.env.local
    volumes:
      - ../apps/web:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev
